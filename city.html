<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="city.css" />
  </head>
  <body>
    <p class="heading">
      <strong><em> Beautiful photos of my city(Kurnool)</em></strong>
    </p>
    <p style="text-align: right; size: 5px; font-style: italic">
      Click on the pics for description
    </p>
    <div class="grid-container">
      <div class="img-wrapper" id="image1-wrapper">
        <img src="image1.jpeg" alt="Image 1" />
      </div>
      <div class="img-wrapper" id="image2-wrapper">
        <img src="image2.jpg" alt="Image 2" />
      </div>
      <div class="img-wrapper" id="image3-wrapper">
        <img src="images3.jpeg" alt="Image 3" />
      </div>
      <div class="img-wrapper" id="image4-wrapper">
        <img src="image4.jpg" alt="Image 4" />
      </div>
      <div class="img-wrapper" id="image5-wrapper">
        <img src="image5.jpg" alt="Image 5" />
      </div>
      <div class="img-wrapper" id="image6-wrapper">
        <img src="image6.jpg" alt="Image 6" />
      </div>
      <div class="img-wrapper" id="image7-wrapper">
        <img src="image7.jpg" alt="Image 7" />
      </div>
      <div class="img-wrapper" id="image8-wrapper">
        <img src="image8.jpg" alt="Image 8" />
      </div>
      <div class="img-wrapper" id="image9-wrapper">
        <img src="image9.jpeg" alt="Image 9" />
      </div>
    </div>
    <div id="popup" class="popup">
      <div id="popup-content" class="popup-content">
        <span id="close" class="close"></span>
        <p id="popup-text">popup text</p>
      </div>
    </div>
    <script src="city.js"></script>
  </body>
</html>
